name: Deploy to GitHub Pages

# El CSS no está versionado: se compila aquí a partir de scss/ y se publica.
# Requiere: Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build site
        run: |
          mkdir -p _site/css _site/js
          cp index.html .nojekyll _site/
          cp js/main.js _site/js/
          pnpm exec sass scss/main.scss _site/css/main.css --style=compressed --no-source-map
          # Activar dominio propio: renombrar CNAME.example -> CNAME y descomentar.
          # cp CNAME _site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
